name: Build NetBird Geolocation DB

on:
  workflow_dispatch: # 允许在 Actions 页面手动点击运行
  push:
    branches: [ main ] # 推送代码到 main 分支时自动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download and Unzip NetBird Geodata
        run: |
          # 下载 NetBird 官方 CSV 数据包
          curl -L -o geodata.zip "https://pkgs.netbird.io/geolocation-dbs/GeoLite2-City-CSV/download?suffix=zip"
          unzip geodata.zip
          # 查找解压后的 Locations 文件路径
          CSV_PATH=$(find . -name "*Locations-en.csv" | head -n 1)
          echo "CSV_PATH=$CSV_PATH" >> $GITHUB_ENV

      - name: Create Conversion Script
        run: |
          cat << 'EOF' > convert.py
          import csv
          import sqlite3
          import os
          import sys

          def convert(csv_path, db_name):
              if not os.path.exists(csv_path):
                  print(f"Error: {csv_path} not found")
                  sys.exit(1)

              conn = sqlite3.connect(db_name)
              cursor = conn.cursor()

              # 核心修复：创建符合 NetBird 预期的表结构
              # 1. 创建基础 geonames 表
              cursor.execute("DROP TABLE IF EXISTS geonames")
              cursor.execute("""
                  CREATE TABLE geonames (
                      geoname_id INTEGER PRIMARY KEY,
                      locale_code TEXT,
                      continent_code TEXT,
                      continent_name TEXT,
                      country_iso_code TEXT,
                      country_name TEXT,
                      subdivision_1_iso_code TEXT,
                      subdivision_1_name TEXT,
                      subdivision_2_iso_code TEXT,
                      subdivision_2_name TEXT,
                      city_name TEXT,
                      metro_code TEXT,
                      time_zone TEXT,
                      is_in_european_union INTEGER
                  )
              """)

              # 2. 兼容性修复：针对 "no such table: source.geonames" 错误
              # 创建一个名为 "source.geonames" 的视图，确保无论 NetBird 用哪种方式查询都能找到数据
              cursor.execute("DROP VIEW IF EXISTS 'source.geonames'")
              cursor.execute("CREATE VIEW 'source.geonames' AS SELECT * FROM geonames")

              print(f"Reading from {csv_path}...")
              with open(csv_path, mode='r', encoding='utf-8') as f:
                  reader = csv.DictReader(f)
                  batch = []
                  for row in reader:
                      batch.append((
                          row['geoname_id'], row['locale_code'], row['continent_code'],
                          row['continent_name'], row['country_iso_code'], row['country_name'],
                          row['subdivision_1_iso_code'], row['subdivision_1_name'],
                          row['subdivision_2_iso_code'], row['subdivision_2_name'],
                          row['city_name'], row['metro_code'], row['time_zone'],
                          1 if row['is_in_european_union'] == '1' else 0
                      ))
                  
                  cursor.executemany("INSERT INTO geonames VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,?)", batch)

              # 创建索引以防 Management 服务查询超时
              cursor.execute("CREATE INDEX idx_geoname_id ON geonames (geoname_id)")
              
              conn.commit()
              conn.close()
              print(f"Successfully created {db_name}")

          if __name__ == "__main__":
              path = os.getenv('CSV_PATH')
              convert(path, "geonames_20251217.db")
          EOF

      - name: Run Conversion
        run: python convert.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: netbird-geonames-db
          path: geonames_20251217.db
          retention-days: 7

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: geonames_20251217.db
          tag_name: v20251217
          name: NetBird GeoDB 20251217
          body: "Generated customized SQLite DB for NetBird Management service."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
